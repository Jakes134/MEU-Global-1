<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MEU Global | CRM Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f4f1;
      --text-primary: #1a1916;
      --text-secondary: #6b6a66;
      --border: rgba(26,25,22,0.1);
      --accent: #1a1916;
      --radius-md: 8px;
      --radius-lg: 12px;
      --sidebar-w: 64px;
      --font: 'DM Sans', sans-serif;
      --font-serif: 'DM Serif Display', serif;
    }
    body { height: 100vh; font-family: var(--font); background: var(--bg-secondary); color: var(--text-primary); }
    
    /* AUTH OVERLAY */
    #login-overlay {
      position: fixed; inset: 0; background: var(--bg-secondary);
      z-index: 2000; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: white; padding: 40px; border-radius: var(--radius-lg);
      box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: center; border: 1px solid var(--border);
      width: 100%; max-width: 400px;
    }
    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--text-secondary); }
    .form-group input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md); }
    .login-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: var(--radius-md); cursor: pointer; }

    /* DASHBOARD LAYOUT */
    .app { display: none; height: 100vh; }
    .sidebar { width: var(--sidebar-w); background: var(--bg-primary); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 12px 0; }
    .main { flex: 1; display: flex; flex-direction: column; }
    .topbar { height: 52px; background: var(--bg-primary); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; padding: 0 20px; }
    .content { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 18px; }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-card">
    <h1 style="font-family: var(--font-serif); font-size: 32px;">MEU Global</h1>
    <p style="color: var(--text-secondary); margin-bottom: 24px;">CRM Dashboard</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="login-btn" onclick="handleLogin()">Sign In</button>
  </div>
</div>

<div class="app" id="app-shell" style="display: flex;">
  <aside class="sidebar">
    <div style="width: 40px; height: 40px; background: #eee; border-radius: 8px;"></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <span style="font-weight: 500;">MEU Global Dashboard</span>
    </header>
    <div class="content">
      <div class="card">
        <div style="font-size: 11px; color: var(--text-secondary);">ACTIVE CLIENTS</div>
        <div style="font-size: 24px; font-family: var(--font-serif);" id="client-count">0</div>
      </div>
      <div class="card">
        <div style="font-size: 11px; color: var(--text-secondary);">SYSTEM STATUS</div>
        <div style="font-size: 24px; font-family: var(--font-serif); color: green;">Online</div>
      </div>
    </div>
  </main>
</div>

<script>
  function handleLogin() {
    // For now, we manually bypass to see the dashboard
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('app-shell').style.display = 'flex';
    console.log("Logged in to MEU Global CRM");
  }
</script>
</body>
</html>
