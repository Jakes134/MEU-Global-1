<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEU Global | CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    /* CSS remains identical to your previous working version for layout... */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #f7f6f3; --surface: #ffffff; --ink: #1a1916; --ink2: #6b6a64; --border: rgba(26,25,22,0.09); --red: #b84c3a; --green: #2a6049; --radius: 10px; --font: 'DM Sans', sans-serif; --serif: 'DM Serif Display', serif; }
    body { font-family: var(--font); background: var(--bg); color: var(--ink); height: 100vh; overflow: hidden; }
    .btn { cursor: pointer; border-radius: var(--radius); border: none; font-weight: 600; padding: 10px 18px; font-size: 14px; }
    .btn-dark { background: var(--ink); color: #fff; }
    #app { display: none; height: 100vh; flex-direction: row; }
    .sidebar { width: 60px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 15px; }
    .nav-btn { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #a8a7a0; background: none; border: none; cursor: pointer; }
    .nav-btn.active { background: var(--ink); color: #fff; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; }
    .view { display: none; padding: 30px; flex: 1; overflow-y: auto; }
    .view.active { display: block; }
    /* ... shortened for brevity, use your previous CSS ... */
    #auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .auth-card { background: #fff; padding: 40px; border-radius: 16px; width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .field { margin-bottom: 15px; }
    .field label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; color: var(--ink2); }
    .field input, .field select, .field textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
    .badge-dot { position: absolute; width: 8px; height: 8px; background: var(--red); border-radius: 50%; top: 5px; right: 5px; border: 2px solid #fff; }
  </style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-card">
    <h1 style="font-family:var(--serif); font-size: 28px; margin-bottom: 20px;">MEU Global</h1>
    <div class="field"><label>Email</label><input type="email" id="l-email" autocapitalize="none" autocorrect="off"></div>
    <div class="field"><label>Password</label><input type="password" id="l-pass" autocapitalize="none" autocorrect="off"></div>
    <button class="btn btn-dark" style="width:100%" onclick="doLogin()">Sign In</button>
  </div>
</div>

<div id="app">
  <nav class="sidebar">
    <div style="width:32px; height:32px; background:#000; border-radius:8px; margin-bottom:20px"></div>
    <button class="nav-btn active" id="nav-dash" onclick="showView('dash')">📅</button>
    <button class="nav-btn" id="nav-tasks" onclick="showView('tasks')">✅</button>
    <button class="nav-btn" id="nav-approvals" onclick="showView('approvals')" style="display:none; position:relative">🔔</button>
    <div style="flex:1"></div>
    <button class="nav-btn" onclick="openUserMgmt()">⚙️</button>
  </nav>

  <div class="main">
    <header class="topbar">
      <h2 id="top-title" style="flex:1; font-family:var(--serif)">Social Calendar</h2>
      <div id="topbar-actions">
        </div>
    </header>

    <div class="view active" id="view-dash">
      <div id="cal-grid" style="display:grid; grid-template-columns: repeat(7, 1fr); gap:1px; background:#ddd; border:1px solid #ddd"></div>
    </div>

    <div class="view" id="view-tasks">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h2 style="font-family:var(--serif)">Tasks</h2>
        <button class="btn btn-dark" id="add-task-btn" style="display:none" onclick="openTaskModal()">+ New Task</button>
      </div>
      <div id="task-list"></div>
    </div>

    <div class="view" id="view-approvals">
      <h2 style="font-family:var(--serif); margin-bottom:20px">Pending Approvals</h2>
      <div id="approval-list"></div>
    </div>
  </div>
</div>

<div id="modal-task" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:9000">
  <div class="auth-card">
    <h2>New Task</h2>
    <div class="field"><label>Title</label><input type="text" id="t-title"></div>
    <div class="field"><label>Client</label><select id="t-client"></select></div>
    <button class="btn btn-dark" onclick="saveTask()">Save Task</button>
    <button onclick="document.getElementById('modal-task').style.display='none'">Cancel</button>
  </div>
</div>

<script>
let session = {};
let allClients = [];

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-pass').value.trim();
  const r = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
  const d = await r.json();
  if (d.success) { 
    session = d; 
    document.getElementById('auth-overlay').style.display = 'none'; 
    launchApp(); 
  } else alert(d.error);
}

function launchApp() {
  document.getElementById('app').style.display = 'flex';
  setupRoleUI();
  loadData();
}

function setupRoleUI() {
  // RESTORE BUTTONS BASED ON ROLE
  if (session.role === 'admin' || session.role === 'client_owner') {
    document.getElementById('add-task-btn').style.display = 'block';
    document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-dark" onclick="openPostModal()">+ New Post</button>`;
  }
  
  if (session.role === 'client_owner') {
    document.getElementById('nav-approvals').style.display = 'flex';
  }
}

async function loadData() {
  const rc = await fetch('/api/clients'); allClients = await rc.json();
  // Fill client dropdowns
  const sel = document.getElementById('t-client');
  sel.innerHTML = allClients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  loadTasks();
}

async function loadTasks() {
  const r = await fetch(`/api/tasks?role=${session.role}&client_id=${session.client_id}&user_id=${session.userId}`);
  const tasks = await r.json();
  document.getElementById('task-list').innerHTML = tasks.map(t => `<div style="background:#fff; padding:15px; margin-bottom:10px; border-radius:8px"><strong>${t.title}</strong> - ${t.client_name || 'No Client'}</div>`).join('');
}

function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.getElementById('nav-' + v).classList.add('active');
}

function openTaskModal() { document.getElementById('modal-task').style.display = 'flex'; }

async function saveTask() {
  const title = document.getElementById('t-title').value;
  const client_id = document.getElementById('t-client').value;
  const r = await fetch('/api/tasks', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({title, client_id, created_by: session.userId}) });
  if (r.ok) { document.getElementById('modal-task').style.display='none'; loadTasks(); }
}
</script>
</body>
</html>
