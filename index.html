<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MEU Global | CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #f7f6f3;
      --surface:    #ffffff;
      --surface2:   #f0efe9;
      --border:     rgba(26,25,22,0.09);
      --border-mid: rgba(26,25,22,0.15);
      --ink:        #1a1916;
      --ink2:       #6b6a64;
      --ink3:       #a8a7a0;
      --green:      #2a6049;
      --green-bg:   #eaf4ef;
      --red:        #b84c3a;
      --red-bg:     #fdf0ee;
      --blue:       #1d5fa6;
      --blue-bg:    #edf4fd;
      --amber:      #92600a;
      --amber-bg:   #fef8ec;
      --ig: #e1306c; --fb: #1877f2; --sk: #1a1916; --li: #0a66c2;
      --sidebar: 56px; --radius: 10px;
      --font: 'DM Sans', sans-serif; --serif: 'DM Serif Display', serif;
    }

    body { font-family: var(--font); background: var(--bg); color: var(--ink); height: 100vh; overflow: hidden; }

    /* ── AUTH ── */
    #auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9000; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 44px 40px; width: 100%; max-width: 400px; box-shadow: 0 2px 24px rgba(0,0,0,0.07); }
    .auth-logo { width: 36px; height: 36px; background: var(--ink); border-radius: 8px; margin-bottom: 20px; }
    .auth-card h1 { font-family: var(--serif); font-size: 28px; margin-bottom: 4px; }
    .auth-card .sub { color: var(--ink2); font-size: 13px; margin-bottom: 28px; }

    /* ── FIELDS ── */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: .05em; color: var(--ink2); margin-bottom: 6px; text-transform: uppercase; }
    .field input, .field textarea, .field select {
      width: 100%; padding: 10px 13px; border: 1px solid var(--border-mid);
      border-radius: var(--radius); font-family: var(--font); font-size: 14px;
      outline: none; transition: border 0.15s, background 0.15s;
      background: var(--bg); color: var(--ink);
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--ink); background: var(--surface); }
    .field textarea { resize: vertical; min-height: 80px; }

    /* ── BUTTONS ── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border-radius: var(--radius); border: none; font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
    .btn:active { transform: scale(0.98); }
    .btn-dark { background: var(--ink); color: #fff; }
    .btn-dark:hover { opacity: 0.88; }
    .btn-ghost { background: transparent; color: var(--ink2); border: 1px solid var(--border-mid); }
    .btn-ghost:hover { background: var(--surface2); }
    .btn-green { background: var(--green); color: #fff; }
    .btn-red { background: var(--red); color: #fff; }
    .btn-sm { padding: 7px 14px; font-size: 12px; }
    .btn-xs { padding: 5px 10px; font-size: 11px; }
    .btn-full { width: 100%; }

    /* ── SHELL ── */
    #app { display: none; height: 100vh; flex-direction: row; }

    /* ── SIDEBAR ── */
    .sidebar { width: var(--sidebar); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 14px 0; gap: 4px; z-index: 100; flex-shrink: 0; }
    .sidebar-logo { width: 32px; height: 32px; background: var(--ink); border-radius: 8px; margin-bottom: 16px; }
    .nav-btn { width: 38px; height: 38px; border-radius: 10px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink3); position: relative; transition: background 0.15s, color 0.15s; }
    .nav-btn:hover { background: var(--surface2); color: var(--ink); }
    .nav-btn.active { background: var(--ink); color: #fff; }
    .tooltip { position: absolute; left: calc(100% + 10px); top: 50%; transform: translateY(-50%); background: var(--ink); color: #fff; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 6px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
    .nav-btn:hover .tooltip { opacity: 1; }
    .sidebar-spacer { flex: 1; }
    .badge-dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; background: var(--red); border-radius: 50%; border: 1.5px solid var(--surface); }

    /* ── MAIN ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .topbar { height: 58px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 12px; flex-shrink: 0; }
    .topbar-title { font-family: var(--serif); font-size: 20px; flex: 1; }

    /* ── VIEWS ── */
    .view { display: none; flex: 1; overflow-y: auto; padding: 24px; }
    .view.active { display: block; }

    /* ── CALENDAR ── */
    .cal-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .cal-nav { display: flex; align-items: center; gap: 12px; }
    .cal-month-label { font-family: var(--serif); font-size: 22px; min-width: 180px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); border: 1px solid var(--border); border-radius: var(--radius); background: var(--border); gap: 1px; overflow: hidden; }
    .cal-day-header { background: var(--surface2); padding: 10px; text-align: center; font-size: 11px; font-weight: 700; color: var(--ink3); text-transform: uppercase; }
    .cal-cell { background: var(--surface); min-height: 110px; padding: 8px; cursor: pointer; position: relative; transition: background 0.1s; }
    .cal-cell:hover { background: #fafaf9; }
    .cal-date { font-size: 13px; font-weight: 500; color: var(--ink2); margin-bottom: 5px; }
    .post-chip { padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-bottom: 3px; border-left: 3px solid var(--ink); background: var(--surface2); color: var(--ink2); display: flex; align-items: center; gap: 4px; }
    
    /* ── MODALS & TOAST ── */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.38); display: none; align-items: center; justify-content: center; z-index: 8000; backdrop-filter: blur(3px); }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--surface); border-radius: 18px; width: 100%; max-width: 520px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.18); }
    .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: #fff; padding: 12px 22px; border-radius: 10px; font-size: 14px; opacity: 0; transition: 0.25s; z-index: 9999; }
    .toast.show { opacity: 1; transform: translateY(-8px); }
    .toast.err { background: var(--red); }
    .toast.ok  { background: var(--green); }
    .data-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    .data-table th, .data-table td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
    .badge-admin { background: var(--blue-bg); color: var(--blue); }
    .badge-user { background: var(--surface2); color: var(--ink2); }
  </style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo"></div>
    <h1>MEU Global</h1>
    <p class="sub">Sign in to access your workspace.</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="l-email" autocapitalize="none" autocorrect="off" placeholder="name@meuglobal.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="l-pass" autocapitalize="none" autocorrect="off" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-dark btn-full" onclick="doLogin()">Sign In</button>
    <div id="auth-error" style="margin-top:12px; color:var(--red); font-size:13px; display:none"></div>
  </div>
</div>

<div id="change-pw-overlay" style="position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:8500;">
  <div class="auth-card">
    <h1>Set New Password</h1>
    <p class="sub">Please update your password to continue.</p>
    <div class="field"><label>New Password</label><input type="password" id="cp-new" autocapitalize="none"></div>
    <div class="field"><label>Confirm</label><input type="password" id="cp-confirm" autocapitalize="none"></div>
    <button class="btn btn-dark btn-full" onclick="doChangePassword()">Update Password</button>
  </div>
</div>

<div id="app">
  <nav class="sidebar">
    <div class="sidebar-logo"></div>
    <button class="nav-btn active" onclick="showView('dash')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></button>
    <button class="nav-btn" onclick="showView('tasks')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></button>
    <div class="sidebar-spacer"></div>
    <button class="nav-btn" onclick="openUserMgmt()"><div id="user-initials" style="background:var(--ink); color:#fff; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px">?</div></button>
  </nav>

  <div class="main">
    <header class="topbar">
      <span class="topbar-title" id="topbar-title">Social Media Calendar</span>
      <button class="btn btn-dark btn-sm" onclick="openPostModal()">+ New Post</button>
    </header>

    <div class="view active" id="view-dash">
      <div class="cal-toolbar">
        <div class="cal-nav">
          <button class="btn btn-ghost btn-sm" onclick="calPrev()">‹</button>
          <span class="cal-month-label" id="cal-label"></span>
          <button class="btn btn-ghost btn-sm" onclick="calNext()">›</button>
        </div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <div class="view" id="view-tasks">
      <h2 style="font-family:var(--serif); margin-bottom:20px">Tasks</h2>
      <div id="task-list"></div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="user-mgmt-modal">
  <div class="modal">
    <div class="modal-head"><h2>Account & Management</h2><button onclick="closeUserMgmt()" style="border:none; background:none; font-size:20px; cursor:pointer">×</button></div>
    <div id="admin-section" style="display:none">
      <h3 style="font-size:14px; margin-bottom:10px">Add User</h3>
      <div class="field"><label>Name</label><input type="text" id="nu-name"></div>
      <div class="field"><label>Email</label><input type="email" id="nu-email" autocapitalize="none"></div>
      <div class="field"><label>Role</label><select id="nu-role"><option value="user">User</option><option value="admin">Admin</option></select></div>
      <button class="btn btn-dark btn-full" onclick="createNewUser()">Create User</button>
      <div id="user-table-wrap"></div>
    </div>
    <hr style="margin:20px 0; border:none; border-top:1px solid var(--border)">
    <button class="btn btn-ghost btn-full" style="color:var(--red)" onclick="location.reload()">Sign Out</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let session = {};
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 3000);
}

// ─── LOGIN LOGIC ───
async function doLogin() {
  const emailRaw = document.getElementById('l-email').value;
  const passRaw  = document.getElementById('l-pass').value;
  
  // MOBILE FIX: Force trim on both fields before sending
  const email = emailRaw.toLowerCase().trim();
  const pass  = passRaw.trim();

  if (!email || !pass) return;

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const d = await r.json();
    if (d.success) {
      session = d;
      document.getElementById('auth-overlay').style.display = 'none';
      if (d.mustChange) {
        document.getElementById('change-pw-overlay').style.display = 'flex';
      } else {
        launchApp();
      }
    } else {
      document.getElementById('auth-error').textContent = d.error;
      document.getElementById('auth-error').style.display = 'block';
    }
  } catch (e) { toast('Connection error', 'err'); }
}

async function doChangePassword() {
  const np = document.getElementById('cp-new').value.trim();
  const cp = document.getElementById('cp-confirm').value.trim();
  if (np !== cp || np.length < 5) return toast('Invalid password match', 'err');

  const r = await fetch('/api/change-password', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ userId: session.userId, newPassword: np })
  });
  if (r.ok) {
    document.getElementById('change-pw-overlay').style.display = 'none';
    launchApp();
  }
}

function launchApp() {
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-initials').textContent = session.name ? session.name[0].toUpperCase() : '?';
  if (session.role === 'admin') document.getElementById('admin-section').style.display = 'block';
  renderCalendar();
}

function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
}

// ─── CALENDAR ───
function calPrev() { calMonth--; if(calMonth < 0){ calMonth=11; calYear--; } renderCalendar(); }
function calNext() { calMonth++; if(calMonth > 11){ calMonth=0; calYear++; } renderCalendar(); }

async function renderCalendar() {
  const label = new Date(calYear, calMonth).toLocaleString('default', { month: 'long', year: 'numeric' });
  document.getElementById('cal-label').textContent = label;
  
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d => `<div class="cal-day-header">${d}</div>`).join('');

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const days = new Date(calYear, calMonth + 1, 0).getDate();

  for (let i=0; i<offset; i++) grid.innerHTML += `<div class="cal-cell" style="opacity:0.2"></div>`;
  for (let d=1; d<=days; d++) {
    grid.innerHTML += `<div class="cal-cell"><div class="cal-date">${d}</div></div>`;
  }
}

// ─── ADMIN ───
function openUserMgmt() { 
  document.getElementById('user-mgmt-modal').classList.add('open'); 
  if (session.role === 'admin') loadUsers();
}
function closeUserMgmt() { document.getElementById('user-mgmt-modal').classList.remove('open'); }

async function loadUsers() {
  const r = await fetch('/api/admin/users');
  const users = await r.json();
  document.getElementById('user-table-wrap').innerHTML = `
    <table class="data-table">
      ${users.map(u => `<tr><td>${u.name}</td><td>${u.email}</td><td><span class="badge badge-${u.role}">${u.role}</span></td></tr>`).join('')}
    </table>`;
}

async function createNewUser() {
  const name = document.getElementById('nu-name').value.trim();
  const email = document.getElementById('nu-email').value.trim();
  const role = document.getElementById('nu-role').value;
  if(!name || !email) return toast('Fields required', 'err');

  const r = await fetch('/api/admin/add-user', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name, email, role })
  });
  if (r.ok) {
    toast('User created!', 'ok');
    loadUsers();
  } else {
    const d = await r.json();
    toast(d.error, 'err');
  }
}
</script>
</body>
</html>
